on:
  push:
    branches:
      - master
    paths:
      - 'define_genes.R'
      - 'annotations.R'

name: Build genes

jobs:
  build:
    name: Build genes
    runs-on: ubuntu-latest
    container: bioconductor/bioconductor_docker:devel
    steps:
    - name: Check out
      uses: actions/checkout@v4

    - name: Specify library directory
      run: |
        echo "R_PKG_DIR=${R_HOME}/site-library" >> $GITHUB_ENV

    - name: Restore the package directory
      uses: actions/cache@v4
      with:
        path: ${{ env.R_PKG_DIR }}
        key: installed-genes

    - name: Install all required packages
      shell: Rscript {0}
      run : |
        BiocManager::install(c("AnnotationHub", "ensembldb", "igraph", "BiocParallel")) 

    - name: Restore the AnnotationHub cache
      uses: actions/cache@v4
      with:
        path: ahub_cache 
        key: ahub-genes

    - name: Run the script
      run: |
        export ANNOTATION_HUB_CACHE=$(pwd)/ahub_cache
        Rscript define_genes.R
        curtag=$(cat _genes-tag)
        echo "GENES_TAG=${curtag}" >> $GITHUB_ENV

    - name: Check if tag already exists 
      uses: actions/github-script@v9
      id: check-exists
      with:
        result-encoding: string
        script: |
          try {
              const resp = await github.rest.git.getRef({ 
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: "tags/" + process.env.GENES_TAG
              });
              return String(resp.status == 200);
          } catch (error) {
              return "false";
          }

    - name: Create a new tag 
      uses: actions/github-script@v9
      if: ${{ steps.check-exists.outputs.result == 'false' }}
      with:
        script: |
          await github.rest.git.createTag({ 
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: process.env.GENES_TAG,
              message: "",
              object: context.sha,
              type: "commit"
          });

    - name: Create a new release
      uses: softprops/action-gh-release@v3
      if: ${{ steps.check-exists.outputs.result == 'false' }}
      with:
        tag_name: ${{ env.GENES_TAG }}
        body_path: _genes-session
        files:
          _genes-built/*
